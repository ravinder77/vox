name: "Secret Scanning"

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{github.ref}}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: GitLeaks (Full History)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full git history required by gitleaks

      - name: GitLeaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  detect-secrets:
    name: detect-secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan repository
        run: |
          detect-secrets scan \
            --all-files \
            --force-use-all-plugins \
            --exclude-files '(backend/prisma/seed\.ts|backend/test/.*|frontend/src/components/Auth/AuthPage\.tsx)' \
            > detect-secrets.json
          if ! jq -e '.results | length == 0' detect-secrets.json >/dev/null; then
            echo "Potential secrets detected by detect-secrets:"
            cat detect-secrets.json
            exit 1
          fi
          echo "No secrets detected by detect-secrets."

  # Aggregate — downstream workflows `needs` this job
  secret-scan-gate:
    name: Secret Scan Gate
    runs-on: ubuntu-latest
    needs: [gitleaks, detect-secrets]
    if: always()
    steps:
      - name: Fail if any scan failed
        run: |
          if [[ "${{ needs.gitleaks.result }}" != "success" || "${{ needs.detect-secrets.result }}" != "success" ]]; then
            echo "❌ Secret scan failed — pipeline blocked."
            exit 1
          fi
          echo "✅ No secrets detected."
