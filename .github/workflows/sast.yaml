name: "SAST — SonarQube & Trivy FS"

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

concurrency:
  group: sast-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
# ─────────────────────────────────────────────────────────────────
# 🔎 SonarQube — Backend
# ─────────────────────────────────────────────────────────────────
  sonar-backend:
    name: 🔎 SonarQube — Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      # Run tests first to generate coverage report for Sonar
      - name: Run Tests with Coverage
        run: npm run test -- --coverage --ci
        env:
          NODE_ENV: test

      - name: SonarQube scan — Backend
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Block PR if Quality Gate fails
      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: backend/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


# ─────────────────────────────────────────────────────────────────
# 🔎 SonarQube — Frontend
# ─────────────────────────────────────────────────────────────────
  sonar-frontend:
    name: SonarQube - Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with coverage
        run: npm run test -- --coverage

      - name: SonarQube scan — Frontend
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        with:
          scanMetadataReportFile: frontend/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


# ─────────────────────────────────────────────────────────────────
# 🛡️ Trivy FileSystem Scan
# ─────────────────────────────────────────────────────────────────
  trivy-fs-backend:
    name: Trivy - filesystem vulnerability scanner (backend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner - backend
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: ./backend
          format: sarif
          output: trivy-backend.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload Trivy FS SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-fs-backend

  trivy-fs-frontend:
    name: Trivy - filesystem vulnerability scanner (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner — frontend
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: ./frontend
          format: sarif
          output: trivy-frontend.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Upload Trivy FS SARIF results (frontend)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-fs-frontend


  # ── Gate ─────────────────────────────────────────────────────────
  gate:
    name: ✅ SAST Gate
    runs-on: ubuntu-latest
    needs: [ sonar-backend, sonar-frontend, trivy-fs-backend, trivy-fs-frontend ]
    if: always()
    steps:
      - name: Evaluate
        run: |
          if [[ "${{ needs.sonar-backend.result }}"  != "success" ||
                "${{ needs.sonar-frontend.result }}" != "success" ||
                "${{ needs.trivy-fs-backend.result }}" != "success" ||
                "${{ needs.trivy-fs-frontend.result }}" != "success" ]]; then
            echo "❌ SAST / code quality gate failed."
            exit 1
          fi
          echo "✅ SonarQube Quality Gates passed. No source vulnerabilities."
