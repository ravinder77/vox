
name: "Build & Test"

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"

jobs:
  # ── Backend ──────────────────────────────────────────────────────
  backend:
    name: 🟢 Backend — Typecheck / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Typecheck tests
        run: npm run typecheck:test

      - name: Unit tests + coverage
        run: npm run test -- --coverage --ci
        env:
          NODE_ENV: test

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name:           backend-coverage
          path:           backend/coverage/
          retention-days: 7

      - name: Build
        run: npm run build --if-present

      - name: SCA — npm audit
        run: npm audit --audit-level=high

  # ── Frontend ─────────────────────────────────────────────────────
  frontend:
    name: ⚛️  Frontend — Typecheck / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name:           frontend-coverage
          path:           frontend/coverage/
          retention-days: 7

      - name: Build (production)
        run: npm run build
        env:
          CI:       true
          NODE_ENV: production

      - name: SCA — npm audit
        run: npm audit --audit-level=high

  # ── Gate ─────────────────────────────────────────────────────────
  gate:
    name: ✅ Build & Test Gate
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Evaluate
        run: |
          if [[ "${{ needs.backend.result }}"  != "success" ||
                "${{ needs.frontend.result }}" != "success" ]]; then
            echo "❌ Build/Test failed."
            exit 1
          fi
          echo "✅ Both services built and tested."
