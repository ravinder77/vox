sonar.projectName=vox-backend
sonar.projectKey=ravinder77_vox-backend
sonar.projectVersion=1.0
sonar.organization=ravinder77


# Source & test directories
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts,**/*.test.js,**/*.spec.js
sonar.exclusions=node_modules/**,dist/**,coverage/**,**/*.d.ts

# Coverage report (produced by Jest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/__mocks__/**,src/server.ts,src/realtime/socket.ts

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Quality Gate — fail PR if new code has issues
sonar.qualitygate.wait=true
